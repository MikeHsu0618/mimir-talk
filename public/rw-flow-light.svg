<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 680" width="1100" height="680" role="img" aria-labelledby="title desc">
  <title id="title">Prometheus Remote Write Flow</title>
  <desc id="desc">Prometheus writes data to long-term backend, backend compacts and indexes to S3, then backend serves short and long range queries.</desc>

  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="7" flood-color="#0E3F4E" flood-opacity="0.08" />
    </filter>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#5296B8" />
    </marker>
    <style>
      text {
        font-family: Ubuntu, "Noto Sans TC", "Microsoft JhengHei", sans-serif;
        fill: #0E3F4E;
      }
      .node-title { font-size: 34px; font-weight: 800; }
      .node-sub   { font-size: 34px; font-weight: 800; }
      .edge-label { font-size: 23px; font-weight: 600; fill: #35738E; }
      .edge {
        stroke: #5296B8;
        stroke-width: 3.5;
        fill: none;
        marker-end: url(#arrowBlue);
      }
    </style>
  </defs>

  <!-- Prometheus -->
  <g filter="url(#softShadow)">
    <rect x="390" y="66" width="320" height="116" rx="20"
      fill="rgba(82,150,184,0.09)" stroke="none" />
    <text x="550" y="136" text-anchor="middle" class="node-title">Prometheus</text>
  </g>

  <!-- Long-term Backend -->
  <g filter="url(#softShadow)">
    <rect x="285" y="264" width="530" height="168" rx="22"
      fill="rgba(53,115,142,0.11)" stroke="none" />
    <text x="550" y="334" text-anchor="middle" class="node-title">Long-term</text>
    <text x="550" y="382" text-anchor="middle" class="node-sub">Backend</text>
  </g>

  <!-- S3 Cylinder -->
  <g filter="url(#softShadow)">
    <!-- Bottom cap -->
    <ellipse cx="550" cy="610" rx="115" ry="22"
      fill="rgba(82,150,184,0.09)" stroke="none" />
    <!-- Body -->
    <rect x="435" y="506" width="230" height="104"
      fill="rgba(82,150,184,0.09)" stroke="none" />
    <line x1="435" y1="506" x2="435" y2="610" stroke="none" />
    <line x1="665" y1="506" x2="665" y2="610" stroke="none" />
    <!-- Top cap -->
    <ellipse cx="550" cy="506" rx="115" ry="22"
      fill="rgba(82,150,184,0.14)" stroke="none" />
    <text x="550" y="570" text-anchor="middle" class="node-title">S3</text>
  </g>

  <!-- Prometheus → Backend -->
  <path class="edge" d="M550 182 L550 264" />
  <text x="612" y="215" class="edge-label">
    <tspan x="612" dy="0">remote_write</tspan>
    <tspan x="612" dy="30">protobuf</tspan>
  </text>

  <!-- Backend → S3 -->
  <path class="edge" d="M550 432 L550 484" />
  <text x="620" y="466" class="edge-label">壓縮 + 建 index</text>

  <!-- Backend self-loop -->
  <path class="edge" d="M815 316 C 970 316, 970 416, 815 416" />
  <text x="900" y="355" class="edge-label" text-anchor="middle">
    <tspan x="930" dy="0">查短期</tspan>
    <tspan x="930" dy="32">查長期</tspan>
  </text>
</svg>
